<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAYS DOWNLOADER PRO - TikTok & YouTube Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .header h1 span {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 15px;
        }

        .warning-badge {
            display: inline-block;
            background: rgba(255, 193, 7, 0.2);
            border: 1px solid #ffc107;
            border-radius: 50px;
            padding: 8px 20px;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .download-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group input {
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #ff416c;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .button-group button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .preview-btn {
            background: #3498db;
        }

        .preview-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .download-btn {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
        }

        .download-btn:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .preview-container {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .preview-container h3 {
            margin-bottom: 15px;
            color: #333;
        }

        #videoPreview iframe {
            width: 100%;
            max-width: 560px;
            height: 315px;
            border-radius: 8px;
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }

        .result-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .result-link {
            display: inline-block;
            padding: 12px 15px;
            background: #27ae60;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .result-link:hover {
            background: #229954;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-msg {
            background: #fee;
            color: #c00;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            text-align: center;
        }

        .note {
            color: #666;
            font-size: 0.85rem;
            margin-top: 15px;
            display: block;
            text-align: center;
        }

        .features {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .feature-item {
            text-align: center;
            color: white;
        }

        .feature-item i {
            font-size: 2rem;
            margin-bottom: 8px;
            display: block;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 2rem; }
            .button-group { flex-direction: column; }
            #videoPreview iframe { height: 200px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><span>BAYS</span> DOWNLOADER PRO</h1>
            <p>Download Video TikTok & YouTube - LANGSUNG, GAK PERLU COPY PASTE!</p>
            <div class="warning-badge">
                <i class="fas fa-shield-alt"></i> Untuk konten publik/milik sendiri
            </div>
        </div>

        <div class="download-box">
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="Tempel link TikTok/YouTube disini...">
                <div class="button-group">
                    <button id="previewBtn" class="preview-btn"><i class="fas fa-eye"></i> Preview</button>
                    <button id="downloadBtn" class="download-btn"><i class="fas fa-download"></i> Download Langsung</button>
                </div>
            </div>
            
            <div id="previewContainer" class="preview-container" style="display: none;">
                <h3><i class="fas fa-play-circle"></i> Preview:</h3>
                <div id="videoPreview"></div>
            </div>

            <div id="resultBox" class="result-box">
                <h4><i class="fas fa-download"></i> Klik tombol download di bawah:</h4>
                <div id="resultLinks" class="result-links"></div>
            </div>

            <small class="note">💡 Tips: Kalo error, coba ulang 2-3 kali atau pake link video lain.</small>
        </div>

        <div class="features">
            <div class="feature-item"><i class="fab fa-tiktok"></i><span>TikTok</span></div>
            <div class="feature-item"><i class="fab fa-youtube"></i><span>YouTube</span></div>
            <div class="feature-item"><i class="fas fa-bolt"></i><span>No Copy Paste</span></div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const previewBtn = document.getElementById('previewBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const previewContainer = document.getElementById('previewContainer');
        const videoPreview = document.getElementById('videoPreview');
        const resultBox = document.getElementById('resultBox');
        const resultLinks = document.getElementById('resultLinks');

        function extractYouTubeId(url) {
            const regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&?#]+)/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        function isTikTokUrl(url) {
            return /tiktok\.com/.test(url);
        }

        // Preview
        previewBtn.addEventListener('click', () => {
            const url = urlInput.value.trim();
            if (!url) {
                alert('⚠️ Masukkan link dulu Bos!');
                return;
            }

            const youtubeId = extractYouTubeId(url);
            
            if (youtubeId) {
                videoPreview.innerHTML = `<iframe src="https://www.youtube.com/embed/${youtubeId}" frameborder="0" allowfullscreen></iframe>`;
                previewContainer.style.display = 'block';
                resultBox.style.display = 'none';
            } else if (isTikTokUrl(url)) {
                videoPreview.innerHTML = `<div style="background:#f0f0f0; padding:20px; border-radius:8px; text-align:center">
                    <i class="fab fa-tiktok" style="font-size:50px"></i>
                    <p>TikTok video siap di download!</p></div>`;
                previewContainer.style.display = 'block';
                resultBox.style.display = 'none';
            } else {
                alert('❌ Hanya support YouTube atau TikTok!');
            }
        });

        // Download function dengan multiple API backup
        async function downloadDirect() {
            const url = urlInput.value.trim();
            
            if (!url) {
                alert('⚠️ Link kosong!');
                return;
            }

            downloadBtn.disabled = true;
            downloadBtn.innerHTML = '<span class="loading"></span> Mencari link...';

            const youtubeId = extractYouTubeId(url);

            // YOUTUBE
            if (youtubeId) {
                // Buka tab baru ke y2mate (paling stabil)
                window.open(`https://www.y2mate.com/youtube/${youtubeId}`, '_blank');
                alert('✅ Arahkan ke halaman download YouTube.\nPilih MP4 atau MP3, klik Start lalu Download!');
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = '<i class="fas fa-download"></i> Download Langsung';
                return;
            }

            // TIKTOK - Multiple API
            if (isTikTokUrl(url)) {
                const apis = [
                    `https://tikdown.org/api/ajaxSearch?q=${encodeURIComponent(url)}`,
                    `https://api.tikmate.app/api/lookup?url=${encodeURIComponent(url)}`,
                    `https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`
                ];

                let success = false;

                for (let api of apis) {
                    try {
                        const response = await fetch(api);
                        const data = await response.json();
                        
                        let videoUrl = null;
                        
                        if (data.video) videoUrl = data.video;
                        else if (data.video_url) videoUrl = data.video_url;
                        else if (data.data && data.data.play) videoUrl = data.data.play;
                        
                        if (videoUrl) {
                            resultLinks.innerHTML = `
                                <a href="${videoUrl}" class="result-link" target="_blank">
                                    <i class="fab fa-tiktok"></i> Klik untuk Download Video TikTok
                                </a>
                                <p style="font-size:12px; color:#666; margin-top:5px">Klik kanan → Save link as untuk menyimpan</p>
                            `;
                            resultBox.style.display = 'block';
                            success = true;
                            break;
                        }
                    } catch(e) {
                        console.log('API error, coba next...');
                    }
                }

                if (!success) {
                    // Fallback terakhir: buka snaptik
                    if(confirm('⚠️ Server sibuk! Buka Snaptik untuk download? (tinggal paste link otomatis)')) {
                        window.open(`https://snaptik.app/${encodeURIComponent(url)}`, '_blank');
                    }
                }
            } else {
                alert('❌ Link tidak valid!');
            }

            downloadBtn.disabled = false;
            downloadBtn.innerHTML = '<i class="fas fa-download"></i> Download Langsung';
        }

        downloadBtn.addEventListener('click', downloadDirect);
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') downloadDirect();
        });
    </script>
</body>
</html>
